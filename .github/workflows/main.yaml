name: mina

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - production
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - production
      - develop

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_channel: stable

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [develop, staging, production]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build for ${{ matrix.environment }} environment
        run: flutter build apk --flavor ${{ matrix.environment }} --release

      - name: Deploy to ${{ matrix.environment }}
        if: github.ref == 'refs/heads/production' || github.ref == 'refs/heads/develop' 
        run: |
          if [ "${{ matrix.environment }}" == "develop" ]; then
            # Deploy to dev server
          elif [ "${{ matrix.environment }}" == "staging" ]; then
            # Deploy to staging server
          else
            # Deploy to production server
          fi